name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  SPARKLE_TOOLS_VERSION: "2.9.4"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" BigDaddy/Info.plist

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 1800 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          echo -n "$APPLE_API_KEY_P8_BASE64" | base64 --decode -o "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, sign, notarize, package DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./scripts/package.sh

      - name: Sign update archive for Sparkle
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -sL -o "$RUNNER_TEMP/sparkle-tools.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle-tools"
          tar -xf "$RUNNER_TEMP/sparkle-tools.tar.xz" -C "$RUNNER_TEMP/sparkle-tools"

          DMG_PATH=$(ls dist/*.dmg)
          RESULT=$(echo "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/sparkle-tools/bin/sign_update" --ed-key-file - "$DMG_PATH")
          echo "$RESULT"
          SIGNATURE=$(echo "$RESULT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$RESULT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          echo "dmg_path=${DMG_PATH}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"
          echo "length=${LENGTH}" >> "$GITHUB_OUTPUT"

      - name: Checksum
        run: shasum -a 256 dist/*.dmg | tee dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/checksums.txt
          generate_release_notes: true

      - name: Update appcast.xml on gh-pages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          MIN_OS: "12.4"
          DMG_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.sparkle_sign.outputs.dmg_name }}
          EDSIGNATURE: ${{ steps.sparkle_sign.outputs.signature }}
          DMG_LENGTH: ${{ steps.sparkle_sign.outputs.length }}
          RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p public
          if git show origin/gh-pages:appcast.xml > public/appcast.xml.tmp 2>/dev/null; then
            mv public/appcast.xml.tmp public/appcast.xml
            echo "Loaded existing appcast.xml from gh-pages"
          else
            rm -f public/appcast.xml.tmp
            echo "No existing gh-pages appcast.xml, will create a new one"
          fi
          APPCAST_PATH=public/appcast.xml ./scripts/update_appcast.sh

      - name: Publish appcast.xml to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: false
